<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>#BERITABARU - Portal Berita Modern</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #2563eb;
            --primary-light: #60a5fa;
            --accent: #ec4899;
            --accent-light: #f472b6;
            --bg: #ffffff;
            --bg-secondary: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: rgba(0, 0, 0, 0.08);
            --shadow-lg: rgba(0, 0, 0, 0.15);
        }

        html[data-theme="dark"] {
            --bg: #0f172a;
            --bg-secondary: #1e293b;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-light: #cbd5e1;
            --border: #334155;
            --shadow: rgba(0, 0, 0, 0.3);
            --shadow-lg: rgba(0, 0, 0, 0.5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.3s ease, color 0.3s ease;
            overflow-x: hidden;
        }

        /* Loading Screen */
        #loadingScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 1;
            transition: opacity 0.5s ease-out;
        }

        #loadingScreen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Topbar */
        .topbar {
            position: sticky;
            top: 0;
            background: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            box-shadow: 0 2px 8px var(--shadow);
            transition: all 0.3s ease;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .theme-toggle {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .theme-toggle:hover {
            transform: scale(1.1);
        }

        .login-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .login-btn:hover {
            transform: scale(1.15);
        }

        /* Modal Login */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 200;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 10px 40px var(--shadow-lg);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.3s ease;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: var(--text);
        }

        .form-group {
            margin-bottom: 1rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-light);
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-size: 1rem;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn {
            padding: 0.75rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            width: 100%;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            background: var(--primary-light);
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-danger {
            background: #ef4444;
            color: white;
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-success {
            background: #10b981;
            color: white;
        }

        .btn-success:hover {
            background: #059669;
        }

        /* Dashboard Admin */
        .dashboard {
            position: fixed;
            top: 70px;
            left: 0;
            width: 100%;
            height: calc(100% - 70px);
            background: rgba(0, 0, 0, 0.7);
            z-index: 150;
            display: none;
            align-items: flex-start;
            justify-content: flex-end;
            padding-right: 0;
        }

        .dashboard.active {
            display: flex;
        }

        .dashboard-panel {
            background: var(--card-bg);
            width: 100%;
            max-width: 500px;
            height: 100%;
            box-shadow: -5px 0 20px var(--shadow-lg);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
            }
            to {
                transform: translateX(0);
            }
        }

        .dashboard-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .dashboard-header h2 {
            font-size: 1.25rem;
        }

        .dashboard-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
        }

        .dashboard-close:hover {
            color: var(--text);
        }

        .dashboard-content {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .form-area {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }

        .form-area input, .form-area textarea {
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg);
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.3s ease;
        }

        .form-area input:focus, .form-area textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-area textarea {
            resize: vertical;
            min-height: 120px;
        }

        .news-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .news-item-admin {
            background: var(--bg-secondary);
            padding: 1rem;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            border: 1px solid var(--border);
        }

        .news-item-admin h4 {
            font-size: 0.95rem;
            color: var(--text);
            margin: 0;
        }

        .news-item-admin .time {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .news-item-admin .actions {
            display: flex;
            gap: 0.5rem;
        }

        /* Main Content */
        .container {
            padding: 2rem 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Grid Berita */
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            animation: fadeIn 0.6s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .news-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px var(--shadow);
            display: flex;
            flex-direction: column;
        }

        .news-card:hover {
            box-shadow: 0 8px 24px var(--shadow-lg);
            transform: translateY(-4px);
        }

        .news-card-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            overflow: hidden;
        }

        .news-card-content {
            padding: 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .news-card-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            color: var(--text);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-card-snippet {
            font-size: 0.9rem;
            color: var(--text-light);
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .news-card-time {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        /* Modal Baca Berita */
        #newsModal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 300;
            padding: 1rem;
        }

        #newsModal.active {
            display: flex;
        }

        .news-modal-content {
            background: var(--card-bg);
            border-radius: 12px;
            max-width: 700px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px var(--shadow-lg);
            position: relative;
            padding: 2rem;
        }

        .news-modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-light);
            transition: color 0.3s ease;
            z-index: 10;
        }

        .news-modal-close:hover {
            color: var(--text);
        }

        .news-modal-image {
            width: 100%;
            height: 250px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }

        .news-modal-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text);
        }

        .news-modal-meta {
            display: flex;
            gap: 1rem;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
            flex-wrap: wrap;
        }

        .news-modal-meta-item {
            font-size: 0.9rem;
            color: var(--text-light);
        }

        .news-modal-category {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }

        .news-modal-body {
            font-size: 1rem;
            line-height: 1.8;
            color: var(--text);
            word-break: break-word;
        }

        .news-modal-body p {
            margin-bottom: 1rem;
        }

        /* Bottom Ticker */
        .ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--primary);
            padding: 0.75rem 0;
            z-index: 99;
            overflow: hidden;
        }

        .ticker-label {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 0.5rem 1rem;
            margin-left: 1rem;
            font-weight: 600;
            font-size: 0.85rem;
            border-radius: 4px;
            text-transform: uppercase;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .ticker-content {
            display: inline-flex;
            gap: 2rem;
            white-space: nowrap;
            animation: scroll-ticker 50s linear infinite;
            padding-left: calc(100% + 2rem);
        }

        .ticker-content:hover {
            animation-play-state: paused;
        }

        @keyframes scroll-ticker {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(calc(-100% - 2rem));
            }
        }

        .ticker-item {
            cursor: pointer;
            color: white;
            font-size: 0.9rem;
            padding: 0.5rem 0;
            transition: opacity 0.3s ease;
        }

        .ticker-item:hover {
            opacity: 0.8;
            text-decoration: underline;
        }

        /* Adjust main content for ticker */
        body {
            padding-bottom: 60px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .topbar {
                padding: 0.75rem 1rem;
            }

            .logo {
                font-size: 1.2rem;
            }

            .container {
                padding: 1rem;
            }

            .news-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .dashboard-panel {
                max-width: 100%;
            }

            .ticker-label {
                padding: 0.4rem 0.8rem;
                font-size: 0.75rem;
                margin-left: 0.5rem;
            }

            .news-modal-content {
                padding: 1.5rem;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary-light);
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
        <div class="spinner"></div>
    </div>

    <!-- Topbar -->
    <div class="topbar">
        <div class="logo">🔔 #BERITABARU</div>
        <div class="topbar-right">
            <button class="theme-toggle" id="themeToggle" title="Toggle Dark Mode">🌙</button>
            <button class="login-btn" id="loginBtn" title="Admin Login">👤</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <button class="modal-close" id="loginModalClose">✕</button>
            <h2 class="modal-title">Admin Login</h2>
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" placeholder="admin" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" placeholder="admin" required>
                </div>
                <button type="submit" class="btn btn-primary">Login</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Admin -->
    <div class="dashboard" id="dashboard">
        <div class="dashboard-panel">
            <div class="dashboard-header">
                <h2>Admin Panel</h2>
                <button class="dashboard-close" id="dashboardClose">✕</button>
            </div>
            <div class="dashboard-content">
                <div class="form-area">
                    <input type="text" id="newsTitle" placeholder="Judul Berita" maxlength="100">
                    <textarea id="newsBody" placeholder="Isi Berita..."></textarea>
                    <button class="btn btn-success" id="addNewsBtn">Tambah Berita</button>
                </div>
                <div class="news-list" id="newsList"></div>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <div class="container">
        <div class="news-grid" id="newsGrid"></div>
    </div>

    <!-- News Modal -->
    <div class="modal" id="newsModal">
        <div class="news-modal-content" id="newsModalContent">
            <button class="news-modal-close" id="newsModalClose">✕</button>
        </div>
    </div>

    <!-- Bottom Ticker -->
    <div class="ticker">
        <span class="ticker-label">📰 TERBARU</span>
        <div class="ticker-content" id="tickerContent"></div>
    </div>

    <script>
        // Data Management
        const NEWS_STORAGE_KEY = 'berita_news';
        const ADMIN_CREDENTIALS = { username: 'admin', password: 'admin' };
        let isAdminLoggedIn = false;
        let newsList = [];

        // Initialize
        function init() {
            loadNewsFromStorage();
            renderNewsGrid();
            renderTicker();
            renderNewsList();
            setupEventListeners();
            hideLoadingScreen();
            initTheme();
        }

        function hideLoadingScreen() {
            const loading = document.getElementById('loadingScreen');
            setTimeout(() => {
                loading.classList.add('hidden');
            }, 500);
        }

        // Theme Management
        function initTheme() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeToggle();
        }

        function updateThemeToggle() {
            const theme = document.documentElement.getAttribute('data-theme');
            document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        document.getElementById('themeToggle').addEventListener('click', () => {
            const currentTheme = document.documentElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeToggle();
        });

        // News Storage
        function loadNewsFromStorage() {
            const stored = localStorage.getItem(NEWS_STORAGE_KEY);
            newsList = stored ? JSON.parse(stored) : getDefaultNews();
            saveNewsToStorage();
        }

        function saveNewsToStorage() {
            localStorage.setItem(NEWS_STORAGE_KEY, JSON.stringify(newsList));
        }

        function getDefaultNews() {
            return [
                {
                    id: 1,
                    title: 'Indonesia Raih Medali Emas di Olimpiade',
                    body: 'Tim atlet Indonesia berhasil meraih medali emas yang gemilang di ajang Olimpiade internasional. Prestasi ini menunjukkan dedikasi dan kerja keras para atlet dalam mempersiapkan diri menghadapi kompetisi bergengsi tersebut. Pemerintah memberikan apresiasi tinggi atas pencapaian luar biasa ini.',
                    category: 'Olahraga',
                    emoji: '🥇',
                    time: new Date(Date.now() - 2 * 60000).toISOString()
                },
                {
                    id: 2,
                    title: 'Teknologi AI Terbaru Mengubah Industri',
                    body: 'Perkembangan teknologi kecerdasan buatan semakin pesat dan mulai diaplikasikan dalam berbagai sektor industri. Inovasi ini diharapkan dapat meningkatkan efisiensi dan produktivitas perusahaan. Para ahli memprediksi bahwa AI akan menjadi tulang punggung transformasi digital di masa depan.',
                    category: 'Teknologi',
                    emoji: '🤖',
                    time: new Date(Date.now() - 10 * 60000).toISOString()
                },
                {
                    id: 3,
                    title: 'Cuaca Ekstrem Melanda Sebagian Wilayah',
                    body: 'Badan Meteorologi mengumumkan peringatan cuaca ekstrem untuk beberapa wilayah Indonesia dalam beberapa hari ke depan. Masyarakat diminta untuk meningkatkan kewaspadaan dan mempersiapkan diri menghadapi kemungkinan bencana alam. Petugas tanggap darurat telah disiapkan untuk respons cepat.',
                    category: 'Bencana',
                    emoji: '⛈️',
                    time: new Date(Date.now() - 30 * 60000).toISOString()
                },
                {
                    id: 4,
                    title: 'Ekonomi Indonesia Tumbuh Signifikan',
                    body: 'Pertumbuhan ekonomi Indonesia mencapai angka yang cukup signifikan berkat kinerja sektor ekspor dan konsumsi domestik. Analis pasar melihat prospek positif untuk kuartal mendatang dengan asumsi stabilitas geopolitik terjaga. Investasi asing terus mengalir ke berbagai sektor strategis.',
                    category: 'Ekonomi',
                    emoji: '📈',
                    time: new Date(Date.now() - 45 * 60000).toISOString()
                },
                {
                    id: 5,
                    title: 'Kampanye Kesehatan Mental Diluncurkan',
                    body: 'Pemerintah meluncurkan kampanye besar-besaran untuk meningkatkan kesadaran tentang pentingnya kesehatan mental. Program ini mencakup layanan konseling gratis dan workshop edukasi di berbagai kota. Diharapkan inisiatif ini dapat mengurangi stigma dan meningkatkan akses pelayanan kesehatan mental.',
                    category: 'Kesehatan',
                    emoji: '🧠',
                    time: new Date(Date.now() - 60 * 60000).toISOString()
                }
            ];
        }

        // Admin Functions
        function openLoginModal() {
            document.getElementById('loginModal').classList.add('active');
        }

        function closeLoginModal() {
            document.getElementById('loginModal').classList.remove('active');
            document.getElementById('loginForm').reset();
        }

        function openDashboard() {
            document.getElementById('dashboard').classList.add('active');
        }

        function closeDashboard() {
            document.getElementById('dashboard').classList.remove('active');
        }

        document.getElementById('loginBtn').addEventListener('click', () => {
            if (isAdminLoggedIn) {
                openDashboard();
            } else {
                openLoginModal();
            }
        });

        document.getElementById('loginModalClose').addEventListener('click', closeLoginModal);

        document.getElementById('dashboardClose').addEventListener('click', closeDashboard);

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            if (username === ADMIN_CREDENTIALS.username && password === ADMIN_CREDENTIALS.password) {
                isAdminLoggedIn = true;
                closeLoginModal();
                openDashboard();
                document.getElementById('loginBtn').textContent = '👨‍💼';
            } else {
                alert('Username atau password salah!');
            }
        });

        // Add News
        document.getElementById('addNewsBtn').addEventListener('click', () => {
            const title = document.getElementById('newsTitle').value.trim();
            const body = document.getElementById('newsBody').value.trim();

            if (!title || !body) {
                alert('Judul dan isi berita tidak boleh kosong!');
                return;
            }

            const emojis = ['📰', '🔥', '💡', '🎯', '✨', '🚀', '📢'];
            const categories = ['Umum', 'Teknologi', 'Olahraga', 'Bisnis', 'Hiburan'];

            const newNews = {
                id: Date.now(),
                title,
                body,
                emoji: emojis[Math.floor(Math.random() * emojis.length)],
                category: categories[Math.floor(Math.random() * categories.length)],
                time: new Date().toISOString()
            };

            newsList.unshift(newNews);
            saveNewsToStorage();
            renderNewsGrid();
            renderTicker();
            renderNewsList();

            document.getElementById('newsTitle').value = '';
            document.getElementById('newsBody').value = '';
        });

        // Render Functions
        function renderNewsGrid() {
            const grid = document.getElementById('newsGrid');
            grid.innerHTML = '';

            newsList.forEach(news => {
                const card = document.createElement('div');
                card.className = 'news-card';
                card.innerHTML = `
                    <div class="news-card-image">${news.emoji}</div>
                    <div class="news-card-content">
                        <div>
                            <h3 class="news-card-title">${escapeHtml(news.title)}</h3>
                            <p class="news-card-snippet">${escapeHtml(news.body.substring(0, 100))}...</p>
                        </div>
                        <p class="news-card-time">${formatTime(news.time)}</p>
                    </div>
                `;
                card.addEventListener('click', () => openNewsModal(news));
                grid.appendChild(card);
            });
        }

        function renderTicker() {
            const tickerContent = document.getElementById('tickerContent');
            tickerContent.innerHTML = '';

            newsList.forEach(news => {
                const item = document.createElement('span');
                item.className = 'ticker-item';
                item.textContent = `${news.emoji} ${escapeHtml(news.title)}`;
                item.addEventListener('click', () => openNewsModal(news));
                tickerContent.appendChild(item);
            });
        }

        function renderNewsList() {
            const list = document.getElementById('newsList');
            list.innerHTML = '';

            newsList.forEach(news => {
                const item = document.createElement('div');
                item.className = 'news-item-admin';
                item.innerHTML = `
                    <h4>${escapeHtml(news.title)}</h4>
                    <p class="time">${formatTime(news.time)}</p>
                    <div class="actions">
                        <button class="btn btn-secondary" onclick="editNews(${news.id})">Edit</button>
                        <button class="btn btn-danger" onclick="deleteNews(${news.id})">Hapus</button>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        // Edit News
        window.editNews = function(id) {
            const news = newsList.find(n => n.id === id);
            if (news) {
                document.getElementById('newsTitle').value = news.title;
                document.getElementById('newsBody').value = news.body;
                deleteNews(id);
            }
        };

        // Delete News
        window.deleteNews = function(id) {
            newsList = newsList.filter(n => n.id !== id);
            saveNewsToStorage();
            renderNewsGrid();
            renderTicker();
            renderNewsList();
        };

        // News Modal
        function openNewsModal(news) {
            const content = document.getElementById('newsModalContent');
            content.innerHTML = `
                <button class="news-modal-close" onclick="closeNewsModal()">✕</button>
                <div class="news-modal-image">${news.emoji}</div>
                <div class="news-modal-category">${escapeHtml(news.category)}</div>
                <h1 class="news-modal-title">${escapeHtml(news.title)}</h1>
                <div class="news-modal-meta">
                    <span class="news-modal-meta-item">📅 ${formatDate(news.time)}</span>
                    <span class="news-modal-meta-item">🕐 ${formatTime(news.time)}</span>
                </div>
                <div class="news-modal-body">${escapeHtml(news.body).replace(/\n/g, '<p>')}</p></div>
            `;
            document.getElementById('newsModal').classList.add('active');
        }

        function closeNewsModal() {
            document.getElementById('newsModal').classList.remove('active');
        }

        document.getElementById('newsModalClose').addEventListener('click', closeNewsModal);

        document.getElementById('newsModal').addEventListener('click', (e) => {
            if (e.target.id === 'newsModal') {
                closeNewsModal();
            }
        });

        // Utility Functions
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(isoString) {
            const date = new Date(isoString);
            const now = new Date();
            const diff = now - date;

            const minutes = Math.floor(diff / 60000);
            const hours = Math.floor(diff / 3600000);
            const days = Math.floor(diff / 86400000);

            if (minutes < 1) return 'Baru saja';
            if (minutes < 60) return `${minutes}m`;
            if (hours < 24) return `${hours}h`;
            if (days < 7) return `${days}d`;

            return date.toLocaleDateString('id-ID');
        }

        function formatDate(isoString) {
            const date = new Date(isoString);
            return date.toLocaleDateString('id-ID', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        // Event Listeners
        function setupEventListeners() {
            document.getElementById('loginModal').addEventListener('click', (e) => {
                if (e.target.id === 'loginModal') {
                    closeLoginModal();
                }
            });
        }

        // Auto refresh grid setiap 1 detik
        setInterval(() => {
            if (!isAdminLoggedIn) {
                // Grid tetap dirender dengan data terbaru dari storage
                renderNewsGrid();
                renderTicker();
            }
        }, 1000);

        // Start Application
        window.addEventListener('load', init);
    </script>
</body>
</html>
